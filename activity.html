<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p> Finding the largest number
    </p>
    <p id="result"></p>
    <script>
        function findsjogo(){
            var i
            var gojo =0
            for (i=0; i<arguments.length;i++){
                if(arguments[i] > gojo){
                    gojo=arguments[i]
                }
            }
            return gojo
        }
        document.getElementById("result").innerHTML=findsjogo(564,896,643)
    </script>
</body>
</html>
